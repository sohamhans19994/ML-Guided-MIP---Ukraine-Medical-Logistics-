# Synthetic data pipeline configuration
# -------------------------------------
# Keep all tunable values here so the generation pipeline stays reproducible.

paths:
  # Top-level data layout.
  data_dir: data
  cache_dir: data/cache
  output_dir: data/synthetic
  figures_dir: data/synthetic/figures

  # Input data.
  acled_csv: data/ACLED Data_2026-03-25.csv

  # Downloaded/cacheable assets.
  raw_graph_cache: data/cache/ukraine_major_roads.graphml
  occupied_cache_gz: data/cache/deepstate-map-data.geojson.gz
  occupied_cache_geojson: data/cache/deepstate-map-data.geojson
  coastline_cache: data/cache/ukraine_coastline.geojson
  boundary_cache: data/cache/ukraine_boundary.geojson
  natural_earth_countries_zip: data/cache/ne_10m_admin_0_countries.zip
  natural_earth_countries_dir: data/cache/ne_10m_admin_0_countries

  # Final reusable synthetic outputs.
  filtered_raw_graph: data/synthetic/ukraine_filtered_raw.graphml
  adaptive_graph: data/synthetic/ukraine_adaptive_coarse.graphml
  demand_nodes_csv: data/synthetic/demand_nodes.csv
  summary_json: data/synthetic/build_summary.json
  bundle_pickle: data/synthetic/ukraine_synthetic_bundle.pkl
  config_used_yaml: data/synthetic/config_used.yaml

  # Optional saved figures.
  occupied_filter_figure: data/synthetic/figures/current_occupied_filter.png
  adaptive_figure: data/synthetic/figures/adaptive_coarsening.png
  edge_metric_figure: data/synthetic/figures/adaptive_edge_metrics.png
  cost_figure: data/synthetic/figures/adaptive_cost_score.png

data_sources:
  # Geographic source references.
  ukraine_place: Ukraine
  occupied_remote_url: https://raw.githubusercontent.com/cyterat/deepstate-map-data/main/deepstate-map-data.geojson.gz
  natural_earth_countries_url: https://naciscdn.org/naturalearth/10m/cultural/ne_10m_admin_0_countries.zip

raw_graph:
  # OSM road network download/filtering.
  network_type: drive
  custom_filter: '["highway"~"motorway|trunk|primary|secondary"]'
  max_query_area_size: 50000000000

occupied_filter:
  # Sovereign-held Ukraine geometry:
  # Natural Earth land polygon minus the currently occupied territory.
  # The raw graph is clipped to stay inside this new border, with a small tolerance.
  outside_new_border_tolerance_km: 10.0
  # Used to detect which parts of the new border are the occupied-frontline interface.
  frontline_match_km: 10.0
  # Outside occupied areas, this controls how far the border-risk penalty reaches.
  border_risk_buffer_km: 60.0

demand:
  # ACLED-based demand-node generation.
  country: Ukraine
  min_year: 2022
  event_types:
    - Explosions/Remote violence
    - Battles
    - Violence against civilians
  n_clusters: 15
  random_state: 42
  candidate_cap: 200

adaptive_coarsening:
  # Demand-aware adaptive coarsening.
  eps_near: 0.15
  eps_mid: 0.25
  eps_far: 0.40
  near_radius: 0.50
  mid_radius: 1.50

costs:
  # Cost score is built from only three interpretable inputs:
  # 1. cluster size / inherited infrastructure
  # 2. incident edge support / access support
  # 3. distance to the occupied-facing frontline

  # Final magnitudes:
  # a_i = alpha * score
  # b_i = beta  * score
  alpha: 100.0
  beta: 12.0

  # Importance factors in the weighted sum.
  # All three components are on a 0-1 scale before weighting.
  score_weights:
    small_cluster: 0.10
    low_edge_support: 0.30
    frontline_danger: 0.60

  # Piecewise frontline-distance bands.
  # 1. outside the new sovereign border -> flat very high penalty
  # 2. near the frontline -> cubic penalty as distance approaches zero
  # 3. somewhat further -> linear decline in penalty
  # 4. far away -> logarithmically decaying tail
  frontline_distance_bands_km:
    near_km: 10.0
    mid_km: 50.0
    far_log_scale_km: 20.0

  # These values define the raw shape of the frontline penalty curve.
  # The resulting raw frontline component is normalized to 0-1 before
  # being combined with the other cost components.
  frontline_component_values:
    outside_border_flat: 20.0
    near_ceiling: 18.0
    near_floor: 10.0
    mid_floor: 2.0
    far_floor: 0.5


visualization:
  # Toggle figure generation and common styling.
  enabled: true
  use_basemap: true
  basemap_zoom: 6
  occupied_filter_figsize: [18, 8]
  adaptive_figsize: [14, 9]
  cost_figsize: [20, 8]
  zone_colors:
    near: "#d73027"
    mid: "#fdae61"
    far: "#1a9850"
